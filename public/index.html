<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Social Media</title>
    </head>

    <body>
        <script>
            window.addEventListener("load", () => renderPosts(1));
            let currentPage = 1;
            let lastPage = 0;
            let fetching = false;
            document.addEventListener("scroll", async () => {
                if (fetching) return;
                if (currentPage == lastPage) return;
                let currentScroll = window.scrollY;
                let maxScrollHeight =
                    document.documentElement.scrollHeight - window.innerHeight;
                if (currentScroll / maxScrollHeight > 0.7) {
                    fetching = true;
                    currentPage++;
                    await renderPosts(currentPage);
                    fetching = false;
                }
            });

            function getCookieValue(name) {
                const regex = new RegExp(`(^|)${name}=([^:]+)`);
                const match = decodeURIComponent(document.cookie).match(regex);
                if (match) {
                    return match[2];
                }
            }

            async function renderPosts(page) {
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                let body = await fetch(
                    `http://127.0.0.1:8000/api/posts?page=${page}`,
                    {
                        credentials: "include",
                    },
                );
                let data = await body.json();
                console.log(data);

                // document.getElementById("posts").innerHTML = "";
                
                for (let post of data.data) {
                    document.getElementById("posts").innerHTML += `
                        <h2>${post.caption}</h2>
                    ${post.image ? `<img src="http://127.0.0.1:8000/storage/uploads/${post.image}" style="width: 300px; border: 1px solid #ccc;"/>` : `<div>No Image</div>`}
                        <br/>
                        `;
                }
                currentPage = data.current_page;
                lastPage = data.last_page;

                // let pagination = document.getElementById("pagination");
                // pagination.innerHTML = "";
                // if (currentPage > 2) {
                //     pagination.appendChild(pageButton(1));
                // }
                // if (currentPage != 1) {
                //     pagination.appendChild(pageButton(currentPage - 1));
                // }
                // for (let i = currentPage; i < data.last_page + 1; i++) {
                //     pagination.appendChild(pageButton(i));
                // }
            }

            async function create() {
                const postImage = document.getElementById("any_image");
                if (postImage == null) return;
                if (postImage.files.length != 1) return;
                console.log(postImage.files[0]);

                const formData = new FormData();
                formData.append("caption", "A new post from the formData");
                formData.append("image", postImage.files[0]);

                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/api/posts", {
                    method: "POST",
                    headers: {
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                    body: formData,
                });
            }

            async function register() {
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        email: "someone1s@gmail.com",
                        password: "password123",
                    }),
                });
            }

            async function setAvatar() {
                const image = document.getElementById("any_image");
                if (image == null) return;
                const formData = new FormData();
                formData.append("avatar", image.files[0]);
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/api/users/avatar", {
                    method: "POST",
                    headers: {
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                    body: formData,
                });
            }

            async function login() {
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        email: "someone1s@gmail.com",
                        password: "password123",
                    }),
                });
            }

            async function logout() {
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/auth/logout", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                });
            }

            function pageButton(page) {
                let btn = document.createElement("button");
                btn.innerText = page.toString();
                btn.addEventListener("click", () => {
                    renderPosts(page);
                });
                return btn;
            }
        </script>

        <button onclick="create()">Post</button>
        <input type="file" id="any_image" accept="image/png, image/jpeg" />
        <button onclick="register()">Register</button>
        <button onclick="setAvatar()">Set Avatar</button>
        <button onclick="login()">Login</button>
        <a href="http://127.0.0.1:8000/auth/redirect/google">
            Login with google
        </a>
        <button onclick="logout()">Logout</button>
        <div id="pagination"></div>
        <div id="posts"></div>
    </body>
</html>
