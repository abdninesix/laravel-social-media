<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Social Media</title>
    </head>

    <body>
        <script>
            window.addEventListener("load", renderPosts);

            function getCookieValue(name) {
                const regex = new RegExp(`(^|)${name}=([^:]+)`);
                const match = decodeURIComponent(document.cookie).match(regex);
                if (match) {
                    return match[2];
                }
            }

            async function renderPosts() {
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });

                let body = await fetch("http://127.0.0.1:8000/api/posts", {
                    credentials: "include",
                });

                let json = await body.json();
                console.log(json);
                for (let post of json) {
                    document.getElementById("posts").innerHTML += `
                    <h2>${post.caption}</h2>
                    <img src="http://127.0.0.1:8000/storage/uploads/${post.image}" style="width: 300px;"/>
                    <br/>
                    `;
                }
            }

            async function create() {
                const postImage = document.getElementById("post_image");
                if (postImage == null) return;
                if (postImage.files.length != 1) return;
                console.log(postImage.files[0]);

                const formData = new FormData();
                formData.append("caption", "A new post from the formData");
                formData.append("image", postImage.files[0]);

                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/api/posts", {
                    method: "POST",
                    headers: {
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                    body: formData,
                });
            }

            async function register() {
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        email: "someone1s@gmail.com",
                        password: "password123",
                    }),
                });
            }

            async function login() {
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        email: "someone1s@gmail.com",
                        password: "password123",
                    }),
                });
            }

            async function logout() {
                await fetch("http://127.0.0.1:8000/sanctum/csrf-cookie", {
                    credentials: "include",
                });
                fetch("http://127.0.0.1:8000/auth/logout", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Accept: "application/json",
                        "X-XSRF-TOKEN": getCookieValue("XSRF-TOKEN"),
                    },
                    credentials: "include",
                });
            }
        </script>

        <button onclick="create()">Post</button>
        <input type="file" id="post_image" accept="image/png, image/jpeg" />
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
        <a href="http://127.0.0.1:8000/auth/redirect/google"
            >Login with google</a
        >
        <button onclick="logout()">Logout</button>
    </body>
</html>
